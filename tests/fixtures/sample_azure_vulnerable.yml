trigger:
  - main

variables:
  API_KEY: "abc123secretxyz"
  DATABASE_PASSWORD: "hardcodedpassword123"
  SAFE_VAR: $(safeVariable)

pool:
  vmImage: ubuntu-latest

jobs:
  - job: build
    steps:
      - script: |
          pip install requests flask boto3
          pip install pytest
          echo "Building..."
        displayName: Install dependencies

      - script: |
          env
          printenv
          echo $API_KEY
        displayName: Debug environment

      - script: |
          docker run myapp:latest pytest
          docker build --build-arg PASSWORD=hardcoded123 .
          curl -k https://internal.example.com/setup.sh
          curl --insecure https://api.example.com/deploy
        displayName: Docker and deploy steps

      - script: pytest
        displayName: Run tests

  - job: deploy
    steps:
      - script: |
          curl -H "Authorization: Bearer hardcodedtoken123" https://api.example.com
          ./deploy.sh
        displayName: Deploy

  - job: selfhosted
    pool:
      name: MyCustomAgentPool
    steps:
      - script: echo "running on self hosted"
        displayName: Self hosted job