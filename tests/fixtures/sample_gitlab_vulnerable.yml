stages:
  - build
  - test
  - deploy

variables:
  API_KEY: "abc123secretxyz"
  DATABASE_PASSWORD: "hardcodedpassword123"
  SAFE_VAR: $CI_PROJECT_ID

build-job:
  stage: build
  script:
    - pip install requests flask boto3
    - pip install pytest
    - npm install express lodash
    - echo "Building..."

test-job:
  stage: test
  script:
    - pytest
    - env
    - printenv
    - echo $API_KEY

docker-job:
  stage: build
  script:
    - docker run myapp:latest pytest
    - docker build --build-arg TOKEN=hardcoded123 .
    - 'curl --insecure https://api.example.com'
    - 'curl -k https://internal.example.com/setup.sh'

deploy-job:
  stage: deploy
  script:
    - ./deploy.sh $DEPLOY_TOKEN
    - 'curl -H "Authorization: Bearer hardcodedtoken123" https://api.example.com'
  tags:
    - self-hosted
    - docker